# ============================================================
# FinFlow - SonarQube Local Development Setup
# ============================================================
# Usage: docker-compose -f docker-compose-sonarqube.yml up -d
# Access: http://localhost:9000 (default login: admin / admin)
# ============================================================

version: "3.8"

services:
  sonarqube:
    image: sonarqube:lts-community
    container_name: finflow-sonarqube
    depends_on:
      - sonar-db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - sonar-net

  sonar-db:
    image: postgres:15-alpine
    container_name: finflow-sonar-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    networks:
      - sonar-net

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonar_postgres_data:

networks:
  sonar-net:
    driver: bridge
