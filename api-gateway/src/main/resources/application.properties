spring.application.name=api-gateway
server.port=${GATEWAY_PORT:8080}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

spring.main.web-application-type=reactive

# =========================
# IMPORTANT: MULTIPART FIX
# =========================
spring.codec.max-in-memory-size=20MB

# =========================
# JWT SECRET (for gateway validation)
# =========================
jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey}

# =========================
# GLOBAL HEADER (GATEWAY SECRET)
# =========================
gateway.secret=${GATEWAY_SECRET:my-secret-key}
spring.cloud.gateway.default-filters[0].name=AddRequestHeader
spring.cloud.gateway.default-filters[0].args.name=X-Gateway-Secret
spring.cloud.gateway.default-filters[0].args.value=${GATEWAY_SECRET:my-secret-key}

# ====================================================================
# SWAGGER AGGREGATION ROUTES (MUST come before generic service routes)
# ====================================================================
spring.cloud.gateway.routes[0].id=auth-service-api-docs
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/v3/api-docs,/auth/v3/api-docs/**

spring.cloud.gateway.routes[1].id=application-service-api-docs
spring.cloud.gateway.routes[1].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/application/v3/api-docs,/application/v3/api-docs/**

spring.cloud.gateway.routes[2].id=doc-verification-api-docs
spring.cloud.gateway.routes[2].uri=lb://DOC-VERIFICATION
spring.cloud.gateway.routes[2].predicates[0]=Path=/documents/v3/api-docs,/documents/v3/api-docs/**

# =========================
# AUTH SERVICE
# =========================
spring.cloud.gateway.routes[3].id=auth-service
spring.cloud.gateway.routes[3].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/auth/**

# =========================
# APPLICATION (COMMON)
# =========================
spring.cloud.gateway.routes[4].id=application-service-common
spring.cloud.gateway.routes[4].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/application/**

# =========================
# USER ROUTES
# =========================
spring.cloud.gateway.routes[5].id=application-service-user
spring.cloud.gateway.routes[5].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/user/**

# =========================
# ADMIN ROUTES
# =========================
spring.cloud.gateway.routes[6].id=application-service-admin
spring.cloud.gateway.routes[6].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/admin/**

# =========================
# DOC VERIFICATION
# =========================
spring.cloud.gateway.routes[7].id=doc-verification
spring.cloud.gateway.routes[7].uri=lb://DOC-VERIFICATION
spring.cloud.gateway.routes[7].predicates[0]=Path=/documents/**
spring.cloud.gateway.routes[7].filters[0].name=AddRequestHeader
spring.cloud.gateway.routes[7].filters[0].args.name=X-Gateway-Secret
spring.cloud.gateway.routes[7].filters[0].args.value=${GATEWAY_SECRET:my-secret-key}

# =========================
# EUREKA
# =========================
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false

# =========================
# DEBUG LOGS
# =========================
logging.level.org.springframework.cloud.gateway=${LOG_LEVEL_GATEWAY:DEBUG}
logging.level.reactor.netty=${LOG_LEVEL_NETTY:DEBUG}

# =========================
# CORS
# =========================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=false

# =========================
# SPRINGDOC / SWAGGER
# =========================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].url=/auth/v3/api-docs
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[1].url=/application/v3/api-docs
springdoc.swagger-ui.urls[1].name=Application Service
springdoc.swagger-ui.urls[2].url=/documents/v3/api-docs
springdoc.swagger-ui.urls[2].name=Document Verification Service