spring.application.name=api-gateway
server.port=8085

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.main.web-application-type=reactive

# =========================
# IMPORTANT: MULTIPART FIX
# =========================
spring.codec.max-in-memory-size=20MB

# =========================
# GLOBAL HEADER (GATEWAY SECRET)
# =========================
spring.cloud.gateway.server.webflux.default-filters[0].name=AddRequestHeader
spring.cloud.gateway.server.webflux.default-filters[0].args.name=X-Gateway-Secret
spring.cloud.gateway.server.webflux.default-filters[0].args.value=my-secret-key

# =========================
# AUTH SERVICE
# =========================
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

# =========================
# APPLICATION (COMMON)
# =========================
spring.cloud.gateway.server.webflux.routes[1].id=application-service-common
spring.cloud.gateway.server.webflux.routes[1].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/application/**

# =========================
# USER ROUTES
# =========================
spring.cloud.gateway.server.webflux.routes[2].id=application-service-user
spring.cloud.gateway.server.webflux.routes[2].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/user/**

# =========================
# ADMIN ROUTES
# =========================
spring.cloud.gateway.server.webflux.routes[3].id=application-service-admin
spring.cloud.gateway.server.webflux.routes[3].uri=lb://APPLICATION-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/admin/**

# =========================
# DOC VERIFICATION
# =========================
spring.cloud.gateway.server.webflux.routes[4].id=doc-verification
spring.cloud.gateway.server.webflux.routes[4].uri=lb://DOC-VERIFICATION
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/documents/**
spring.cloud.gateway.server.webflux.routes[4].filters[0].name=AddRequestHeader
spring.cloud.gateway.server.webflux.routes[4].filters[0].args.name=X-Gateway-Secret
spring.cloud.gateway.server.webflux.routes[4].filters[0].args.value=my-secret-key

# =========================
# EUREKA
# =========================
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

# =========================
# DEBUG LOGS
# =========================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG