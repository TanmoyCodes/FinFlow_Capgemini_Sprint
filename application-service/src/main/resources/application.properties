spring.application.name=application-service

# ========================
# SERVER PORT
# ========================
server.port=${APP_SERVICE_PORT:8081}

# ========================
# EUREKA CONFIG
# ========================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false

# ========================
# DATABASE
# ========================
spring.datasource.url=${APP_DB_URL:jdbc:mysql://localhost:3306/finflow_app_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA
# ========================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# ========================
# JWT & GATEWAY
# ========================
jwt.secret=${JWT_SECRET:mysecretkeymysecretkeymysecretkey}
gateway.secret=${GATEWAY_SECRET:my-secret-key}

# ========================
# CONFIG SERVER (Temporarily Disabled to bypass broken remote config)
# ========================
spring.cloud.config.enabled=false
# spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# ========================
# RABBITMQ
# ========================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ========================
# REDIS
# ========================
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ========================
# LOGGING
# ========================
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:DEBUG}
logging.level.com.finflow.demo=${LOG_LEVEL_APP:DEBUG}

# ========================
# SPRINGDOC / SWAGGER
# ========================
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/application/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/application/swagger-ui.html
