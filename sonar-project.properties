# ============================================================
# FinFlow - SonarQube Project Configuration
# ============================================================
# This file is used by SonarScanner CLI or Maven Sonar Plugin.
# Make sure SONAR_TOKEN is set as an env variable or passed via CLI.
# ============================================================

sonar.projectKey=finflow-loan-management
sonar.projectName=FinFlow Loan Management System
sonar.projectVersion=1.0.0

# =========================
# SOURCE & BINARY PATHS
# =========================
sonar.modules=auth-service,application-service,doc-verification,api-gateway

# --- Auth Service ---
auth-service.sonar.projectName=Auth Service
auth-service.sonar.sources=src/main/java
auth-service.sonar.tests=src/test/java
auth-service.sonar.java.binaries=target/classes
auth-service.sonar.java.test.binaries=target/test-classes

# --- Application Service ---
application-service.sonar.projectName=Application Service
application-service.sonar.sources=src/main/java
application-service.sonar.tests=src/test/java
application-service.sonar.java.binaries=target/classes
application-service.sonar.java.test.binaries=target/test-classes

# --- Document Verification ---
doc-verification.sonar.projectName=Document Verification Service
doc-verification.sonar.sources=src/main/java
doc-verification.sonar.tests=src/test/java
doc-verification.sonar.java.binaries=target/classes
doc-verification.sonar.java.test.binaries=target/test-classes

# --- API Gateway ---
api-gateway.sonar.projectName=API Gateway
api-gateway.sonar.sources=src/main/java
api-gateway.sonar.tests=src/test/java
api-gateway.sonar.java.binaries=target/classes
api-gateway.sonar.java.test.binaries=target/test-classes

# =========================
# LANGUAGE & ENCODING
# =========================
sonar.language=java
sonar.sourceEncoding=UTF-8
sonar.java.source=17

# =========================
# EXCLUSIONS
# =========================
# Exclude DTOs, configs, enums, entity boilerplate, and test classes from coverage
sonar.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/enums/**,\
  **/config/**,\
  **/LoanApplicationDTO/**,\
  **/exception/**,\
  **/*Application.java

sonar.coverage.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/enums/**,\
  **/config/**,\
  **/LoanApplicationDTO/**,\
  **/exception/**,\
  **/*Application.java,\
  **/security/**

# =========================
# COVERAGE REPORT (JaCoCo)
# =========================
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

# =========================
# HOST (override via CLI or env var)
# =========================
sonar.host.url=${SONAR_HOST_URL:http://localhost:9000}
